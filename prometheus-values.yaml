# Values file for the kube-prometheus-stack Helm chart
# Install with:
#   helm repo add prometheus-community https://prometheus-community.github.io/helm-charts
#   helm install monitoring prometheus-community/kube-prometheus-stack -f prometheus-values.yaml -n monitoring --create-namespace

grafana:
  enabled: true
  adminPassword: "changeme" # override via --set or a Kubernetes secret in real deployments
  service:
    type: ClusterIP
  dashboardProviders:
    dashboardproviders.yaml:
      apiVersion: 1
      providers:
        - name: default
          orgId: 1
          folder: ""
          type: file
          disableDeletion: false
          editable: true
          options:
            path: /var/lib/grafana/dashboards/default

prometheus:
  prometheusSpec:
    retention: 15d
    resources:
      requests:
        cpu: 250m
        memory: 512Mi
      limits:
        cpu: 500m
        memory: 1Gi
    serviceMonitorSelectorNilUsesHelmValues: false

alertmanager:
  enabled: true
  config:
    route:
      receiver: "null"
      routes:
        - match:
            severity: critical
          receiver: "null"
